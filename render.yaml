services:
  # Backend Web Service running FastAPI
  - type: web
    name: url-fishing-backend
    env: python
    buildCommand: pip install -r requirements.txt && python ml/train.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PORT
        value: 10000

  # Frontend Static Site running React
  - type: static
    name: url-fishing-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          name: url-fishing-backend
          type: web
          property: url
