services:
  # Backend Web Service running FastAPI (Docker)
  - type: web
    name: url-fishing-backend
    runtime: docker
    plan: free
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: PORT
        value: 8000

  # Frontend Static Site running React
  - type: web
    name: url-fishing-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          name: url-fishing-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
