services:
  # Backend Web Service running FastAPI (Docker)
  - type: web
    name: url-fishing-backend
    env: docker
    plan: free
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: PORT
        value: 8000

  # Frontend Static Site running React
  - type: static
    name: url-fishing-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          name: url-fishing-backend
          type: web
          property: url
